# EchoAPG-SAM - EchoNet-Dynamic config.yaml
model:
  type: vit_b
  checkpoint: ./checkpoints/sam_vit_b.pth
  lora_r: 16

training:
  epochs: 50
  lr: 1e-4
  batch_size: 10
  patience: 10
  device: cuda

data:
  image_dir: ./data/echonet/images
  mask_dir: ./data/echonet/masks
  filelist_csv: ./data/echonet/FileList.csv
  volumetracings_csv: ./data/echonet/VolumeTracings.csv
  train_ratio: 0.8
  val_ratio: 0.1

loss:
  focal_weight: 0.5
  boundary_weight: 0.05
