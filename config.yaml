# =============================================
# EchoAPG-SAM - Corrected Local config.yaml
# Fixes applied:
#   1. Removed all Kaggle paths → pure local paths
#   2. Points directly to the official SAM checkpoint
#   3. Clean structure with clear English comments
#   4. Fully compatible with existing train.py / inference.py scripts
# =============================================

model:
  type: vit_b
  # ★★★ MUST point to the SAM weight you just downloaded
  checkpoint: ./checkpoints/sam_vit_b.pth
  lora_r: 16                     # LoRA rank (16 is stable and effective)

training:
  epochs: 100
  lr: 1e-4
  batch_size: 10                  # Recommended for GPU with LoRA + MSPAd (use 4 if OOM on 8GB VRAM)
  patience: 10
  device: cuda                   # Change to "cpu" for testing without GPU

data:
  # ★★★ IMPORTANT: Organize your CAMUS dataset like this:
  #   images/  → all .png ultrasound images
  #   masks/   → corresponding .png segmentation masks (filenames must match exactly)
  image_dir: ./data/camus/images
  mask_dir: ./data/camus/masks
  train_ratio: 0.8
  val_ratio: 0.1

loss:
  focal_weight: 0.5
  boundary_weight: 0.05
